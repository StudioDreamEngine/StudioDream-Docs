site_name: StudioDream Documentation
theme:
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - content.code.annotate
    - content.code.copy
    - header.autohide
    - navigation.top
    - toc.follow
  name: material
  custom_dir: docs/theme
  logo: theme/logo.svg
  font:
    text: Rubik
  palette:
    - scheme: slate
      primary: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: default
      primary: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
extra:
  generator: true
watch:
  - docs

plugins:
  - search
  - macros

  - mkdocs-nav-weight:
      section_renamed: true
      index_weight: -10
      warning: true
      reverse: false

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.details
  - tables
  - admonition
  - attr_list
  - md_in_html
  - sane_lists
  
  - toc:
      permalink: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - docs/theme/.icons