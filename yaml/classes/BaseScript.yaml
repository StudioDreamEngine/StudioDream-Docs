Name: BaseScript
Description: This is the base class for all scripts
Category: Scripting
BaseType: Thing
IsAbstract: true
Properties:
  - Name: ScriptContents
    Type: Vector2
    IsAccessible: false
    IsInternal: true
    Description: Content inside the script.
  - Name: ScriptTask
    Type: Task
    IsAccessible: false
    IsInternal: true
    Description: The current task object the script is running under. # Probably theres a better way to describe this
  - Name: Require
    Type: table
    IsAccessible: false
    IsInternal: true
    Description: Script contents after initalization.
Methods:
  - Name: Load
    ReturnType: ScriptContents
    IsAccessible: false
    IsInternal: true
    Description: Initalize the script and return a table.