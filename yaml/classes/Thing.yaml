Name: Thing
Description: This is the base class for all things
Category: Internal
BaseType: ClassicObject
IsAbstract: true
Properties:
  - Name: Serializable
    IsInternal: true
    Type: boolean
  - Name: Parent
    IsAccessible: true
    IsSerialized: true
    Type: Thing
  - Name: Name
    IsAccessible: true
    IsSerialized: true
    Type: string
  - Name: Explorer
    IsAccessible: true
    IsInternal: true
    Description: Special Properties for how this object should be displayed in the explorer
    Type: table
  - Name: UUID
    Description: The Unique ID given to this object
    IsInternal: true
    IsAccessible: true
    Type: string
  - Name: NumericalID
    Description: Secondary ID, potentially used for debugging, i forgot why we have this
    IsInternal: true
    IsAccessible: true
    Type: number
Methods:
  - Name: BindConstraint
    IsInternal: true
  - Name: SetConstraint
    IsInternal: true
  - Name: UnbindConstraints
    IsInternal: true
  - Name: FindConstraintOfType
    IsInternal: true
  - Name: GetProperty
    IsInternal: true
  - Name: FindFirstAncestorWithClass
    Parameters:
      - Name: Class
        Type: string
    Description: Goes up in the tree until it finds a Thing that matches the specified class
    ReturnType: Thing
  - Name: Is
    Description: Checks if this thing
    ReturnType: boolean
  - Name: GetParentCallback
    IsInternal: true
  - Name: SetParent
    IsInternal: true
  - Name: DescendantOf
    ReturnType: boolean
  - Name: IsA
    Parameters:
      - Name: Check
        Type: "{ Thing }"
        Description: Name of the class your trying to check
    ReturnType: boolean
    Description: Checks if thing class Is A certan class
  - Name: GetChildren
    ReturnType: "{ Thing }"
    Description: Returns a table of all the children inside the thing, that does not include children inside the childre
  - Name: GetDescendants
    ReturnType: "{ Thing }"
    Description: Returns a table of everything inside the thing
  - Name: FindFirstChild
    Parameters:
      - Name: Filter
        Type: "{ Thing }"
        Description: Name of the children your trying to find
  - Name: ClearAllChildren
    Parameters:
      - Name: Filter
        Type: "table"
        Description: You can add name of things to not be deleted
    Description: Clears all children inside thing