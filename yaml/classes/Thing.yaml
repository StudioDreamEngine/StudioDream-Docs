Name: Thing
Description: This is the base class for all things
Category: General
BaseType: ClassicObject
IsAbstract: true
Properties:
  - Name: Serializable
    IsInternal: true
    Type: boolean
  - Name: Parent
    IsAccessible: true
    IsSerialized: true
    Type: Thing
  - Name: Name
    IsAccessible: true
    IsSerialized: true
    Type: string
  - Name: Explorer
    IsAccessible: true
    IsInternal: true
    Description: Special Properties for how this object should be displayed in the explorer
    Type: table
  - Name: UUID
    Description: The Unique ID given to this object
    IsInternal: true
    IsAccessible: true
    Type: string
  - Name: NumericalID
    Description: Secondary ID, potentially used for debugging, i forgot why we have this
    IsInternal: true
    IsAccessible: true
    Type: number
Methods:
  - Name: BindConstraint
    IsInternal: true
  - Name: SetConstraint
    IsInternal: true
  - Name: UnbindConstraints
    IsInternal: true
  - Name: FindConstraintOfType
    IsInternal: true
  - Name: GetProperty
    IsInternal: true
  - Name: FindFirstAncestorWithClass
    Parameters:
      - Name: Class
        Type: string
    Description: Goes up in the tree until it finds a Thing that matches the specified class
    ReturnType: Thing
  - Name: Is
    Description: Checks if this object
    ReturnType: boolean
  - Name: GetParentCallback
    IsInternal: true
  - Name: SetParent
    IsInternal: true
  - Name: DescendantOf
    ReturnType: boolean
  - Name: IsA
    ReturnType: boolean
  - Name: GetChildren
    ReturnType: "{ Thing }"
  - Name: GetDescendants
  - Name: FindFirstChild
  - Name: ClearAllChildren