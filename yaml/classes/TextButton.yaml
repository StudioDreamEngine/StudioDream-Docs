Name: TextButton
Description: An text button thing
Category: UI
BaseType: Text
IsCreatable: true
Properties:
  - Name: Hovering
    Type: boolean
    IsAccessible: true
    IsInternal: false
    Description: If the mouse is hovering TextButton, it will be set to true
  - Name: Clicked
    Type: Signal
    IsAccessible: true
    IsInternal: false
    Description: Send a signal to connected functions if the button was clicked