Name: BaseGui
Description: This is the base class for all GUI Things
Category: UI
BaseType: Thing
IsAbstract: true
Properties:
  - Name: AbsolutePosition
    Type: Vector2
    IsAccessible: true
    IsInternal: true
    Description: The position of the thing relative to the viewport
  - Name: AbsoluteSize
    Type: Vector2
    IsAccessible: true
    IsInternal: true
    Description: The size of the thing relative to the viewport
  - Name: Position
    Type: Pivot2D
    IsAccessible: true
  - Name: Size
    Type: Pivot2D
    IsAccessible: true
Methods:
  - Name: GetOffsetPosition
    ReturnType: Vector2
    Description: Get the absolute position relative to the parent thing
  - Name: GetAbsolutePosition
    ReturnType: Vector2
  - Name: GetDisplayPosition
    Description: Get the true position where the thing is displayed (On the screen)
    ReturnType: Vector2
  - Name: GetAbsoluteSize
    ReturnType: Vector2