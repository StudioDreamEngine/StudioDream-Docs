Name: Image2D
Description: UI Image thing.
Category: UI
BaseType: BaseGui
IsCreatable: true
Properties:
  - Name: Image
    Type: File
    IsAccessible: true
    Description: The image resource that this object displays.
  - Name: ImageRect
    Type: Rect
    IsAccessible: true
    Description: Optional property that determines what part of an image will be displayed
  - Name: ImageQuad
    Type: Quad
    IsAccessible: true
    IsInternal: true
    Description: Underlying Love2D quad object used to draw the image
Methods:
  - Name: SetImage
    ReturnType: None
    IsAccessible: false
    IsInternal: true
    Description: Sets a new Image.y